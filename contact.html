<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Contact | TOP Landing Page</title>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Header Logo</a>
    <button id="menu-toggle" class="icon-btn menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    <nav id="site-nav" class="site-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="features.html">Features</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode" aria-pressed="false">🌙 Dark</button>
  </header>

  <main>
    <section class="section page-hero">
      <p class="eyebrow">Get in touch</p>
      <h1>Contact our team</h1>
      <p>Boilerplate content: add your real support hours, contact channels, and team details.</p>
    </section>

    <section class="section">
      <h2>Send a message</h2>
      <form id="contact-form" class="contact-form" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button class="btn btn-primary" type="submit">Send message</button>
      </form>
      <p id="contact-message" class="form-message" aria-live="polite"></p>
    </section>
  </main>

  <button id="back-to-top" class="icon-btn back-to-top" aria-label="Back to top">↑</button>

  <footer class="site-footer">
    Copyright © The Odin Project <span id="year"></span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
